<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>I LOVE U NEMO - Perfect Edition</title>

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background-color: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    canvas {
        display: block;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
    }
  </style>

  
</head>
<body>
  <canvas id="heartCanvas"></canvas>

  <script>
    const canvas = document.getElementById('heartCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const scale = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * scale;
    canvas.height = window.innerHeight * scale;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(scale, scale);
}
window.addEventListener('resize', resizeCanvas);

const textStr = "I LOVE U NEMO";
const heartParticles = [];
// عدد مثالي ومحسوب بدقة لمنع تداخل الجمل أو ركوبها فوق بعضها
const totalHeartParticles = 45; 

// دالة رسم منحنى القلب الأساسي
function getHeartPoint(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    return { x: x, y: y };
}

// إنشاء جمل القلب بتباعد ممتاز ومريح للعين
for (let i = 0; i < totalHeartParticles; i++) {
    heartParticles.push({
        t: (Math.PI * 2 * i) / totalHeartParticles,
        speed: 0.0025 // سرعة حركة متناسقة ومنظمة داخل المسار
    });
}

// إعدادات قلوب المطر الخلفية
const rainHearts = [];
const totalRainHearts = 40; // عدد هادئ لكي لا يسبب زحام خلف القلب

for (let i = 0; i < totalRainHearts; i++) {
    rainHearts.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight - window.innerHeight,
        size: Math.random() * 6 + 4, // أحجام صغيرة وناعمة
        speed: Math.random() * 1.5 + 0.8, // سرعة تساقط هادئة كالمطر الخفيف
        opacity: Math.random() * 0.25 + 0.1 // شفافية خفيفة جداً حتى تظل في الخلفية تماماً
    });
}

// دالة احترافية لرسم قلب بواسطة الـ Canvas في الخلفية
function drawFilledHeart(ctx, x, y, size, opacity) {
    ctx.save();
    ctx.beginPath();
    ctx.globalAlpha = opacity;
    ctx.fillStyle = "#ff69b4";
    ctx.shadowBlur = 0; // بدون توهج للخلفية حتى لا تشوش على القلب الرئيسي
    
    ctx.translate(x, y);
    ctx.moveTo(0, -size / 4);
    ctx.bezierCurveTo(size / 2, -size, size, -size / 3, 0, size);
    ctx.bezierCurveTo(-size, -size / 3, -size / 2, -size, 0, -size / 4);
    
    ctx.fill();
    ctx.restore();
}

function animate() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, width, height);

    // 1. رسم وتحديث مطر القلوب في الخلفية أولاً
    for (let i = 0; i < totalRainHearts; i++) {
        let r = rainHearts[i];
        drawFilledHeart(ctx, r.x, r.y, r.size, r.opacity);
        
        // تحديث الحركة لأسفل
        r.y += r.speed;
        // إذا خرجت القلوب من أسفل الشاشة تعود من الأعلى بشكل عشوائي
        if (r.y > height) {
            r.y = -20;
            r.x = Math.random() * width;
        }
    }

    // 2. رسم القلب الرئيسي المكون من الجمل (فوق المطر)
    const centerX = width / 2;
    const centerY = height / 2;
    const scale = 14.5; // حجم مثالي وثابت بالكامل (تم إلغاء النبض)

    ctx.font = "bold 13px Arial, sans-serif";
    ctx.fillStyle = "#fff0f3"; // لون وردي فاتح نقي وجذاب
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#ff4d6d"; // توهج نيون دافئ ومميز

    for (let i = 0; i < heartParticles.length; i++) {
        let p = heartParticles[i];
        
        // تحريك الجمل بانتظام على المسار المحدد فقط
        p.t += p.speed;
        if (p.t > Math.PI * 2) {
            p.t -= Math.PI * 2;
        }

        const point = getHeartPoint(p.t);
        const x = centerX + point.x * scale;
        const y = centerY - point.y * scale;

        // زاوية ميل هندسية فائقة الأناقة وموحدة
        let angle = -35 * Math.PI / 180; 

        ctx.save();
        ctx.globalAlpha = 1.0; // وضوح كامل للجمل الأساسية
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(textStr, 0, 0);
        ctx.restore();
    }

    requestAnimationFrame(animate);
}

resizeCanvas();
animate();
  </script>
</body>
</html>
